<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Tema 6 — Ley del Consell (Títulos III–V) | Opositar en Valencia</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --naranja: #d97706; --naranja-claro: #fef3c7; --naranja-borde: #f59e0b;
    --azul-oscuro: #1e293b; --texto: #374151; --texto-suave: #6b7280;
    --borde: #e5e7eb; --fondo: #fafaf9; --blanco: #ffffff;
    --verde: #166534; --verde-bg: #f0fdf4; --verde-borde: #86efac;
    --rojo: #991b1b; --rojo-bg: #fef2f2; --rojo-borde: #fca5a5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--fondo); color: var(--texto); min-height: 100vh; font-size: 16px; line-height: 1.6; }
  header { background: var(--blanco); border-bottom: 1px solid var(--borde); }
  .header-top { max-width: 860px; margin: 0 auto; padding: 1.4rem 1.5rem 1rem; display: flex; align-items: flex-start; gap: 1.2rem; }
  .header-logo { width: 48px; height: 48px; border-radius: 8px; object-fit: contain; flex-shrink: 0; }
  .header-textos { flex: 1; }
  .header-site { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--naranja); font-weight: 600; margin-bottom: 3px; }
  .header-titulo { font-family: 'Lora', serif; font-size: clamp(1.25rem, 3.5vw, 1.75rem); font-weight: 700; color: var(--azul-oscuro); line-height: 1.2; }
  .header-sub { font-size: 0.88rem; color: var(--texto-suave); margin-top: 4px; }
  .header-meta { background: var(--naranja-claro); border-top: 1px solid #fde68a; padding: 0.55rem 1.5rem; }
  .header-meta-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; font-size: 0.83rem; color: #92400e; font-weight: 500; }
  .barra-wrap { position: sticky; top: 0; z-index: 100; background: var(--blanco); border-bottom: 1px solid var(--borde); padding: 0.6rem 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .barra-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
  .barra-track { flex: 1; height: 6px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
  .barra-fill { height: 100%; background: var(--naranja); border-radius: 99px; transition: width 0.35s ease; width: 0%; }
  .barra-num { font-size: 13px; font-weight: 600; color: var(--azul-oscuro); white-space: nowrap; min-width: 52px; }
  .barra-score { font-size: 13px; color: var(--texto-suave); white-space: nowrap; }
  .barra-score .ok { color: var(--verde); font-weight: 600; }
  .barra-score .ko { color: var(--rojo); font-weight: 600; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .card { background: var(--blanco); border: 1px solid var(--borde); border-radius: 10px; padding: 1.5rem 1.6rem; margin-bottom: 1.4rem; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.06); }
  .card-num { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--naranja); margin-bottom: 0.5rem; }
  .card-pregunta { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; line-height: 1.55; color: var(--azul-oscuro); margin-bottom: 1.1rem; }
  .opciones { display: flex; flex-direction: column; gap: 0.45rem; }
  .opcion { display: flex; align-items: flex-start; gap: 0.7rem; padding: 0.7rem 1rem; border: 1.5px solid var(--borde); border-radius: 7px; cursor: pointer; background: var(--blanco); text-align: left; font-family: 'Source Sans 3', sans-serif; font-size: 0.93rem; color: var(--texto); line-height: 1.5; transition: border-color 0.15s, background 0.15s; width: 100%; }
  .opcion:hover:not(:disabled) { border-color: var(--naranja-borde); background: var(--naranja-claro); }
  .opcion .letra { font-weight: 700; color: var(--naranja); min-width: 18px; font-size: 0.85rem; margin-top: 2px; flex-shrink: 0; }
  .opcion.correcta { border-color: var(--verde-borde); background: var(--verde-bg); color: var(--verde); }
  .opcion.correcta .letra { color: #15803d; }
  .opcion.incorrecta { border-color: var(--rojo-borde); background: var(--rojo-bg); color: var(--rojo); }
  .opcion.incorrecta .letra { color: var(--rojo); }
  .opcion:disabled { cursor: default; }
  .explicacion { display: none; margin-top: 1rem; padding: 0.9rem 1rem 0.9rem 1.1rem; background: #fffbeb; border-left: 3px solid var(--naranja); border-radius: 0 6px 6px 0; font-size: 0.875rem; line-height: 1.65; color: var(--texto); }
  .explicacion.visible { display: block; animation: fadeIn 0.22s ease; }
  .explicacion strong { color: var(--azul-oscuro); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .resultado { display: none; background: var(--blanco); border: 1px solid var(--borde); border-radius: 12px; padding: 2.5rem 2rem 2rem; margin: 1.5rem 0 2rem; text-align: center; }
  .resultado.visible { display: block; animation: fadeIn 0.3s ease; }
  .resultado-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--naranja); font-weight: 600; margin-bottom: 0.5rem; }
  .resultado h2 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 700; color: var(--azul-oscuro); margin-bottom: 0.3rem; }
  .resultado-nota { font-size: 3.2rem; font-weight: 700; color: var(--azul-oscuro); line-height: 1; margin: 1rem 0 0.3rem; font-family: 'Lora', serif; }
  .resultado-nota span { color: var(--naranja); }
  .calif-badge { display: inline-block; padding: 5px 16px; border-radius: 99px; font-size: 0.9rem; font-weight: 600; margin: 0.6rem 0 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 0 0 1.5rem; }
  .stat { background: var(--fondo); border: 1px solid var(--borde); border-radius: 8px; padding: 0.9rem 0.5rem; }
  .stat-num { font-size: 1.9rem; font-weight: 700; font-family: 'Lora', serif; }
  .stat-lab { font-size: 0.78rem; color: var(--texto-suave); margin-top: 2px; }
  .resultado-hint { font-size: 0.85rem; color: var(--texto-suave); margin-bottom: 1.2rem; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.7rem 1.6rem; border-radius: 7px; font-family: 'Source Sans 3', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s; }
  .btn-naranja { background: var(--naranja); color: white; }
  .btn-naranja:hover { background: #b45309; transform: translateY(-1px); }
  @media (max-width: 580px) { main { padding: 1.2rem 1rem 4rem; } .card { padding: 1.1rem; } .stats { grid-template-columns: 1fr 1fr; } .header-top { padding: 1rem; gap: 0.8rem; } .header-meta { padding: 0.5rem 1rem; } }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <img class="header-logo"
      src="https://opositorgva.wordpress.com/wp-content/uploads/2024/04/cropped-opositar-en-valencia-logo-sin-fondo.png"
      alt="Opositar en Valencia" onerror="this.style.display='none'">
    <div class="header-textos">
      <div class="header-site">Opositar en Valencia · GVA</div>
      <div class="header-titulo">Tema 6 — Ley 5/1983, del Consell (Títulos III, IV y V)</div>
      <div class="header-sub">Relaciones Consell-Les Corts · Administración Pública · Responsabilidad</div>
    </div>
  </div>
  <div class="header-meta">
    <div class="header-meta-inner">
      <span id="totalPreguntas">📋 Cargando...</span>
      <span>🎯 Nivel medio-alto</span>
      <span>🔀 Orden aleatorio en cada intento</span>
      <span>✅ Explicación en cada respuesta</span>
    </div>
  </div>
</header>

<div class="barra-wrap">
  <div class="barra-inner">
    <div class="barra-track"><div class="barra-fill" id="barraFill"></div></div>
    <span class="barra-num" id="barraNum">0 / ?</span>
    <span class="barra-score"><span class="ok" id="scoreOk">✓ 0</span> &nbsp;<span class="ko" id="scoreKo">✗ 0</span></span>
  </div>
</div>

<main id="mainContent"></main>

<script>
const BANCO = [

  /* ══ TÍTULO III — RELACIONES CONSELL / LES CORTS ══ */

  /* Cap. I — Impulso y control */
  {
    p: "El artículo 44.1 de la Ley del Consell establece que el Consell realizará ante Les Corts una declaración de política general. ¿Cuándo tiene lugar exactamente?",
    ops: [
      "En el primer pleno del primer período ordinario de sesiones anual, en el mes de septiembre",
      "En el pleno de apertura de cada legislatura, independientemente del mes",
      "En el primer pleno del segundo período ordinario de sesiones anual, en el mes de enero",
      "En el pleno ordinario que determine el Reglamento de Les Corts en cada inicio de año"
    ],
    c: 0,
    exp: "<strong>Respuesta correcta: A.</strong> El art. 44.1 dispone que el Consell, a través del President, realizará la declaración de política general «en el primer pleno del primer período ordinario de sesiones anual en el mes de septiembre». La declaración va seguida de debate y puede concluir con aprobación de resoluciones."
  },
  {
    p: "¿Cuándo NO tiene lugar el debate de política general del artículo 44.1 de la Ley del Consell?",
    ops: [
      "Los años en que el Consell presenta los presupuestos con retraso",
      "Los años en que se celebre debate de investidura, bien por elecciones a Les Corts, bien por cualquier otra causa",
      "Los años en que se haya aprobado una moción de censura en el semestre anterior",
      "Los años en que el President haya planteado cuestión de confianza"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 44.1 in fine establece que «los años en que se celebre debate de investidura bien por la celebración de elecciones a Les Corts, bien por cualquier otra causa, no tendrá lugar el debate de política general». La ratio es evitar duplicidad de debates programáticos en el mismo ejercicio."
  },
  {
    p: "¿En qué plazo máximo debe el Consell facilitar a Les Corts la información o documentación solicitada, según el artículo 45.2 de la Ley del Consell?",
    ops: [
      "En un plazo no superior a quince días",
      "En un plazo no superior a veinte días",
      "En un plazo no superior a treinta días o manifestar las razones fundadas en derecho que lo impidan",
      "En un plazo no superior a cuarenta y cinco días"
    ],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 45.2 establece que el Consell «deberá facilitar la información o documentación solicitada en un plazo no superior a treinta días o manifestar las razones fundadas en derecho que lo impidan». No puede negarse sin más; si no facilita la información, debe justificar jurídicamente la negativa."
  },
  {
    p: "¿A través de qué cauce se canaliza la relación ordinaria entre el Consell y Les Corts, según el artículo 45.4 de la Ley del Consell?",
    ops: [
      "A través de la Secretaría del Consell y de la Secretaría General de Les Corts",
      "A través de la Presidencia de la Generalitat y del representante del Consell en la Junta de Portavoces",
      "A través del Conseller de la Presidencia y del Presidente de Les Corts directamente",
      "A través de los Grupos Parlamentarios y de los Consellers competentes por razón de materia"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 45.4 establece que «la relación ordinaria entre el Consell y Les Corts se canalizará a través de la Presidencia de la Generalitat y del representante del Consell en la Junta de Portavoces». Este doble canal —institucional y político— garantiza la fluidez de la comunicación ejecutivo-legislativo."
  },
  {
    p: "El artículo 46 de la Ley del Consell regula la responsabilidad política del Consell. ¿Cómo es dicha responsabilidad y cómo se exige?",
    ops: [
      "Es responsabilidad individual de cada miembro; se exige mediante interpelaciones y comparecencias",
      "Es responsabilidad solidaria de su gestión política ante Les Corts; se exige mediante moción de censura y cuestión de confianza",
      "Es responsabilidad solidaria y también individual; se exige únicamente mediante moción de censura",
      "Es responsabilidad colectiva ante Les Corts y ante el Rey; se exige mediante moción de censura"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 46 dispone que «el Consell responde solidariamente de su gestión política ante Les Corts, sin perjuicio de la responsabilidad directa de sus miembros por su gestión. La responsabilidad del Consell es exigible por medio de la moción de censura y de la cuestión de confianza». Hay responsabilidad solidaria del conjunto e individual de cada miembro."
  },

  /* Cap. II — Moción de censura */
  {
    p: "¿Qué fracción mínima de Diputados debe proponer la moción de censura según el artículo 48 de la Ley del Consell?",
    ops: [
      "Al menos la décima parte de los Diputados",
      "Al menos la quinta parte de los Diputados",
      "Al menos la tercera parte de los Diputados",
      "Al menos la cuarta parte de los Diputados"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 48 exige que la moción de censura «sea propuesta, al menos, por la quinta parte de los Diputados en escrito motivado». Contrástese con el modelo estatal (art. 113.1 CE), que exige la décima parte de los Diputados del Congreso. El umbral valenciano es más exigente."
  },
  {
    p: "¿Qué requisito imprescindible debe incluir la moción de censura en el ámbito autonómico valenciano, según el artículo 48 de la Ley del Consell?",
    ops: [
      "Un programa de gobierno alternativo por escrito de al menos 20 páginas",
      "La firma de apoyo de todos los grupos parlamentarios de la oposición",
      "Un candidato a la Presidencia de la Generalitat que haya aceptado la candidatura",
      "La exposición de los motivos del cese exigido con al menos cinco fundamentos jurídicos"
    ],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 48 exige que la moción «habrá de incluir un candidato a la Presidencia de la Generalitat que haya aceptado la candidatura». Es la moción de censura constructiva: no basta derribar al President, hay que proponer un sustituto concreto que haya aceptado expresamente."
  },
  {
    p: "¿En qué plazo pueden presentarse mociones de censura alternativas a la inicial, según el artículo 49.1 de la Ley del Consell?",
    ops: [
      "Dentro de los tres días siguientes a la presentación de la moción inicial",
      "Dentro de los dos días siguientes a la presentación de la moción inicial",
      "Dentro de las cuarenta y ocho horas siguientes a la admisión a trámite",
      "En cualquier momento antes de que comience el debate en el pleno"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 49.1 establece que «dentro de los dos días siguientes a la presentación de la moción de censura podrán presentarse mociones alternativas». Estas mociones alternativas deben reunir los mismos requisitos que la inicial (escrito motivado, candidato aceptante, quinta parte de Diputados)."
  },
  {
    p: "¿Cuál es el plazo mínimo que debe transcurrir desde la presentación de la moción de censura hasta su votación, según el artículo 49.2 de la Ley del Consell?",
    ops: [
      "Al menos tres días desde su presentación",
      "Al menos cuatro días desde su presentación",
      "Al menos cinco días desde su presentación",
      "Al menos siete días desde su presentación"
    ],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 49.2 establece que «la moción de censura no podrá ser votada hasta que transcurran como mínimo cinco días desde su presentación». Este plazo de reflexión coincide con el previsto en el art. 113.3 CE para la moción de censura estatal."
  },
  {
    p: "¿Qué mayoría se requiere para aprobar la moción de censura en la Comunitat Valenciana, según el artículo 49.4 de la Ley del Consell?",
    ops: [
      "Mayoría simple de los Diputados presentes en la sesión",
      "Mayoría de tres quintos de los miembros de Les Corts",
      "Mayoría absoluta de los miembros de Les Corts",
      "Mayoría de dos tercios de los miembros de Les Corts"
    ],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 49.4 exige «el voto favorable de la mayoría absoluta de los miembros de Les Corts» para aprobar la moción de censura. Esta mayoría cualificada, igual a la del modelo estatal, garantiza la estabilidad del ejecutivo y dificulta las mociones meramente destructivas."
  },
  {
    p: "Si se aprueba la moción de censura (art. 50.1 de la Ley del Consell), ¿a quién comunica el Presidente de Les Corts el hecho de la investidura del candidato incluido?",
    ops: [
      "Al Gobierno del Estado para su conocimiento y al DOCV para su publicación",
      "Al Rey, a los efectos de su nombramiento",
      "Al Consell Jurídico Consultivo para su dictamen",
      "Al Tribunal Superior de Justicia de la Comunitat Valenciana"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 50.1 establece que, aprobada la moción, el candidato incluido «se entenderá investido de la confianza de la Cámara, hecho que el Presidente de Les Corts debe comunicar al Rey a los efectos de su nombramiento». La aprobación de la moción vale como investidura: no hay nueva votación de confianza."
  },
  {
    p: "Si la moción de censura no es aprobada por Les Corts (art. 50.2 de la Ley del Consell), ¿qué restricción se impone a sus signatarios?",
    ops: [
      "No podrán presentar otra moción durante el resto de la legislatura",
      "No podrán presentar otra moción durante el mismo período de sesiones",
      "No podrán presentar otra moción durante los seis meses siguientes",
      "No podrán participar en ningún debate de política general durante el año en curso"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 50.2 dispone que si la moción «no fuese aprobada por Les Corts, sus signatarios no podrán presentar otra durante el mismo período de sesiones». Esta limitación evita el uso repetitivo y abusivo de la moción como instrumento de desgaste político."
  },

  /* Cap. III — Cuestión de confianza */
  {
    p: "Según el artículo 51.1 de la Ley del Consell, ¿sobre qué materias puede plantearse la cuestión de confianza?",
    ops: [
      "Exclusivamente sobre el programa de gobierno del President",
      "Sobre su programa, una decisión política o un proyecto de Ley, previa deliberación del Consell",
      "Sobre cualquier asunto de interés general, sin restricción de materias",
      "Solo sobre proyectos de ley de especial trascendencia aprobados por el Consell"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 51.1 permite al President plantear la cuestión de confianza «sobre su programa, una decisión política o un proyecto de Ley», siempre con previa deliberación del Consell. El modelo valenciano es más amplio que el estatal (art. 112 CE), que solo admite programa o declaración de política general."
  },
  {
    p: "¿Cómo se presenta la cuestión de confianza ante Les Corts, según el artículo 51.2 de la Ley del Consell?",
    ops: [
      "Mediante discurso del President ante el Pleno, sin documentación escrita",
      "En escrito motivado ante la Mesa de Les Corts, acompañado del certificado del Consell",
      "Mediante decreto del Consell publicado en el DOCV antes de su presentación",
      "En escrito del Secretario del Consell dirigido al Presidente de Les Corts"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 51.2 dispone que «la cuestión de confianza se presentará, en escrito motivado, ante la Mesa de Les Corts acompañada del correspondiente certificado del Consell». El certificado del Consell acredita que se ha producido la previa deliberación colegial exigida por el art. 51.1."
  },
  {
    p: "¿Cuál es el plazo mínimo que debe transcurrir entre la presentación de la cuestión de confianza y su votación, según el artículo 51.3 de la Ley del Consell?",
    ops: [
      "Al menos cuarenta y ocho horas desde su presentación",
      "Al menos veinticuatro horas desde su presentación",
      "Al menos setenta y dos horas desde su presentación",
      "Al menos cinco días desde su presentación"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 51.3 establece que la cuestión de confianza «será sometida a votación transcurridas al menos veinticuatro horas desde su presentación». Este plazo es más breve que el de la moción de censura (cinco días), lo que permite mayor agilidad cuando es el propio ejecutivo quien busca revalidar su apoyo."
  },
  {
    p: "¿Qué mayoría necesita la cuestión de confianza para entenderse otorgada, según el artículo 51.3 de la Ley del Consell?",
    ops: [
      "Mayoría absoluta de los miembros de Les Corts",
      "Mayoría de tres quintos de los Diputados presentes",
      "Mayoría simple de los Diputados",
      "Mayoría de dos tercios de les Corts en primera votación y simple en segunda"
    ],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 51.3 establece que «la confianza se entenderá otorgada cuando obtenga el voto de la mayoría simple de los diputados». Es la mayoría más baja (simple), lo que facilita que el ejecutivo supere la cuestión de confianza si cuenta con apoyo parlamentario mínimo."
  },
  {
    p: "El artículo 51.3 de la Ley del Consell establece una regla especial cuando la cuestión de confianza versa sobre un proyecto de ley. ¿Cuál es?",
    ops: [
      "El proyecto de ley se tramita por el procedimiento de urgencia en Les Corts",
      "El proyecto de ley se entiende aprobado según el texto enviado por el Consell, salvo que se requiera mayoría cualificada para su aprobación",
      "El proyecto de ley debe ser votado artículo por artículo antes de la votación de confianza",
      "El proyecto de ley requiere mayoría absoluta para su aprobación aunque ordinariamente bastara la simple"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 51.3 in fine dispone que «si la cuestión versare sobre un proyecto de ley, éste se entenderá aprobado según el texto enviado por el Consell, excepto en los casos en los que, para su aprobación, se requiera mayoría cualificada». Es decir, el voto de confianza aprueba el texto gubernamental sin enmiendas, salvo materias que requieran mayoría reforzada."
  },
  {
    p: "Si Les Corts niegan su confianza al President (art. 52 de la Ley del Consell), ¿qué procedimiento sigue?",
    ops: [
      "El President convoca inmediatamente nuevas elecciones autonómicas",
      "Se procede a la elección del nuevo President de acuerdo con el artículo 2 de la Ley del Consell",
      "El Consell continúa en funciones hasta que Les Corts designen un candidato por mayoría absoluta",
      "El President puede disolver Les Corts antes de dimitir si así lo acuerda el Consell"
    ],
    c: 1,

/* ── LÓGICA ── */
let orden = [], respondidas = 0, aciertos = 0, errores = 0;
const TOTAL = BANCO.length;

document.getElementById('totalPreguntas').textContent = '📋 ' + TOTAL + ' preguntas';
document.getElementById('barraNum').textContent = '0 / ' + TOTAL;

function mezclar(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function actualizarBarra() {
  document.getElementById('barraFill').style.width = ((respondidas / TOTAL) * 100) + '%';
  document.getElementById('barraNum').textContent = respondidas + ' / ' + TOTAL;
  document.getElementById('scoreOk').textContent = '✓ ' + aciertos;
  document.getElementById('scoreKo').textContent = '✗ ' + errores;
}

function construirPreguntas() {
  orden = mezclar([...Array(TOTAL).keys()]);
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  const letras = ['A', 'B', 'C', 'D'];

  orden.forEach((idx, pos) => {
    const q = BANCO[idx];
    const opsOrden = mezclar([0, 1, 2, 3]);

    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + pos;

    const numDiv = document.createElement('div');
    numDiv.className = 'card-num';
    numDiv.textContent = 'Pregunta ' + (pos + 1);

    const pregDiv = document.createElement('div');
    pregDiv.className = 'card-pregunta';
    pregDiv.textContent = q.p;

    const opcionesDiv = document.createElement('div');
    opcionesDiv.className = 'opciones';

    opsOrden.forEach((opIdx, i) => {
      const btn = document.createElement('button');
      btn.className = 'opcion';
      btn.dataset.correcto = (opIdx === q.c) ? '1' : '0';
      btn.dataset.pos = pos;
      btn.innerHTML = '<span class="letra">' + letras[i] + '</span><span>' + q.ops[opIdx] + '</span>';
      btn.addEventListener('click', onOpcionClick);
      opcionesDiv.appendChild(btn);
    });

    const expDiv = document.createElement('div');
    expDiv.className = 'explicacion';
    expDiv.id = 'exp-' + pos;
    expDiv.innerHTML = q.exp;

    card.appendChild(numDiv);
    card.appendChild(pregDiv);
    card.appendChild(opcionesDiv);
    card.appendChild(expDiv);
    main.appendChild(card);
  });

  const res = document.createElement('div');
  res.className = 'resultado';
  res.id = 'resultado';
  res.innerHTML = `
    <div class="resultado-eyebrow">Resultado final</div>
    <h2>Test completado</h2>
    <div class="resultado-nota"><span id="rNota">-</span><span style="font-size:1.5rem;color:var(--texto-suave)">/10</span></div>
    <div id="rBadge" class="calif-badge"></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="rOk" style="color:var(--verde)">-</div><div class="stat-lab">Correctas</div></div>
      <div class="stat"><div class="stat-num" id="rKo" style="color:var(--rojo)">-</div><div class="stat-lab">Erróneas</div></div>
      <div class="stat"><div class="stat-num" id="rPct">-</div><div class="stat-lab">% Acierto</div></div>
    </div>
    <p class="resultado-hint">Revisa las explicaciones en cada pregunta para reforzar los conceptos.</p>
    <button class="btn btn-naranja" onclick="reiniciar()">🔄 Nuevo intento</button>
  `;
  main.appendChild(res);
}

function onOpcionClick(e) {
  const btn = e.currentTarget;
  const pos = parseInt(btn.dataset.pos);
  const card = document.getElementById('card-' + pos);
  card.querySelectorAll('.opcion').forEach(b => {
    b.disabled = true;
    if (b.dataset.correcto === '1') b.classList.add('correcta');
    else if (b === btn) b.classList.add('incorrecta');
  });
  document.getElementById('exp-' + pos).classList.add('visible');
  if (btn.dataset.correcto === '1') aciertos++; else errores++;
  respondidas++;
  actualizarBarra();
  if (respondidas === TOTAL) mostrarResultado();
}

function mostrarResultado() {
  const nota = ((aciertos / TOTAL) * 10).toFixed(1);
  const pct = Math.round((aciertos / TOTAL) * 100);
  let badge = '', color = '';
  if (pct >= 90)      { badge = '🏆 Sobresaliente'; color = '#166534'; }
  else if (pct >= 70) { badge = '✅ Notable';        color = '#1d4ed8'; }
  else if (pct >= 50) { badge = '⚠️ Aprobado';      color = '#92400e'; }
  else                { badge = '❌ Suspenso';       color = '#991b1b'; }
  document.getElementById('rNota').textContent = nota;
  document.getElementById('rOk').textContent = aciertos;
  document.getElementById('rKo').textContent = errores;
  document.getElementById('rPct').textContent = pct + '%';
  const badgeEl = document.getElementById('rBadge');
  badgeEl.textContent = badge;
  badgeEl.style.cssText += `;background:${color}22;color:${color};border:1px solid ${color}44`;
  const res = document.getElementById('resultado');
  res.classList.add('visible');
  setTimeout(() => res.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function reiniciar() {
  respondidas = 0; aciertos = 0; errores = 0;
  actualizarBarra();
  construirPreguntas();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

construirPreguntas();
</script>
